{% extends 'base.html' %}

{% block title %}Add Task{% endblock %}

{% block content %}
  <h1>Add Task</h1>
  <div class="form-container">
    <form method="post" action="{% url 'todo_list:add_task' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="submit-button" type="submit">Add Task</button>
    </form>
  </div>
{% endblock %}
