{% extends 'base.html' %}

{% block title %}Edit Tag{% endblock %}

{% block content %}
  <h1>Edit Tag</h1>
  <div class="form-container">
    <form method="post" action="{% url 'todo_list:update_tag' tag.pk %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="submit-button" type="submit">Save Changes</button>
    </form>
  </div>
{% endblock %}
